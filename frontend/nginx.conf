# CareerAI frontend — nginx SPA server with API reverse proxy.
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ---- gzip compression ----
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      application/x-javascript text/xml application/xml application/xml+rss
                      text/javascript image/svg+xml application/font-woff2;

    # ---- hashed, immutable build assets: cache for a year ----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---- never cache the app shell ----
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ---- reverse proxy to the API gateway (same-origin production deployment) ----
    # The upstream is resolved per-request (via a variable + Docker's embedded DNS
    # resolver 127.0.0.11) so nginx starts even when the gateway isn't up yet, rather
    # than failing with "host not found in upstream" at boot.
    location /api/ {
        resolver           127.0.0.11 valid=30s ipv6=off;
        set                $gateway_upstream api-gateway;
        rewrite            ^/api/(.*)$ /$1 break;
        proxy_pass         http://$gateway_upstream:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- WebSocket proxy for interview-service live sessions ----
    location /ws/ {
        resolver           127.0.0.11 valid=30s ipv6=off;
        set                $gateway_upstream api-gateway;
        proxy_pass         http://$gateway_upstream:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ---- SPA fallback: serve index.html for client-side routes ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
