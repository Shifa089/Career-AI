spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/resume_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

app:
  aws:
    s3:
      endpoint: ${AWS_S3_ENDPOINT:}

management:
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    com.careerai.resume: INFO
