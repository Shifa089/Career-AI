spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/resume_db
    username: careerai
    password: careerai
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  aws:
    # Force the LocalStack S3 endpoint in dev (path-style access to http://localhost:4566).
    s3:
      endpoint: ${AWS_S3_ENDPOINT:http://localhost:4566}

logging:
  level:
    com.careerai.resume: DEBUG
    org.hibernate.SQL: DEBUG
