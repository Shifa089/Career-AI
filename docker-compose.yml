name: careerai

services:
  postgres-auth:
    image: pgvector/pgvector:pg16
    container_name: careerai-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${DB_USERNAME:-careerai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-careerai}
    ports:
      - "5432:5432"
    volumes:
      - pg-auth-data:/var/lib/postgresql/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-careerai} -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-resume:
    image: pgvector/pgvector:pg16
    container_name: careerai-postgres-resume
    environment:
      POSTGRES_DB: resume_db
      POSTGRES_USER: ${DB_USERNAME:-careerai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-careerai}
    ports:
      - "5433:5432"
    volumes:
      - pg-resume-data:/var/lib/postgresql/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-careerai} -d resume_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-interview:
    image: pgvector/pgvector:pg16
    container_name: careerai-postgres-interview
    environment:
      POSTGRES_DB: interview_db
      POSTGRES_USER: ${DB_USERNAME:-careerai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-careerai}
    ports:
      - "5434:5432"
    volumes:
      - pg-interview-data:/var/lib/postgresql/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-careerai} -d interview_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-jobmatch:
    image: pgvector/pgvector:pg16
    container_name: careerai-postgres-jobmatch
    environment:
      POSTGRES_DB: jobmatch_db
      POSTGRES_USER: ${DB_USERNAME:-careerai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-careerai}
    ports:
      - "5435:5432"
    volumes:
      - pg-jobmatch-data:/var/lib/postgresql/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-careerai} -d jobmatch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: careerai-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-careerai}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-careerai}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: careerai-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - careerai-net

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: careerai-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - careerai-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: careerai-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: careerai
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - careerai-net

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: careerai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - careerai-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: careerai-grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - careerai-net

  zipkin:
    image: openzipkin/zipkin:3
    container_name: careerai-zipkin
    ports:
      - "9411:9411"
    networks:
      - careerai-net

  localstack:
    image: localstack/localstack:3.8
    container_name: careerai-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: 0
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./docker/localstack-init.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
      - localstack-data:/var/lib/localstack
    networks:
      - careerai-net

networks:
  careerai-net:
    driver: bridge
    name: careerai-net

volumes:
  pg-auth-data:
  pg-resume-data:
  pg-interview-data:
  pg-jobmatch-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  localstack-data:
