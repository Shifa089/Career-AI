name: careerai

services:
  postgres-auth:
    image: pgvector/pgvector:pg16
    container_name: careerai-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${DB_USERNAME:-careerai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-careerai}
    ports:
      - "5432:5432"
    volumes:
      - pg-auth-data:/var/lib/postgresql/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-careerai} -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-resume:
    image: pgvector/pgvector:pg16
    container_name: careerai-postgres-resume
    environment:
      POSTGRES_DB: resume_db
      POSTGRES_USER: ${DB_USERNAME:-careerai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-careerai}
    ports:
      - "5433:5432"
    volumes:
      - pg-resume-data:/var/lib/postgresql/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-careerai} -d resume_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-interview:
    image: pgvector/pgvector:pg16
    container_name: careerai-postgres-interview
    environment:
      POSTGRES_DB: interview_db
      POSTGRES_USER: ${DB_USERNAME:-careerai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-careerai}
    ports:
      - "5434:5432"
    volumes:
      - pg-interview-data:/var/lib/postgresql/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-careerai} -d interview_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-jobmatch:
    image: pgvector/pgvector:pg16
    container_name: careerai-postgres-jobmatch
    environment:
      POSTGRES_DB: jobmatch_db
      POSTGRES_USER: ${DB_USERNAME:-careerai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-careerai}
    ports:
      - "5435:5432"
    volumes:
      - pg-jobmatch-data:/var/lib/postgresql/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-careerai} -d jobmatch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: careerai-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-careerai}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-careerai}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: careerai-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - careerai-net

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: careerai-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - careerai-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: careerai-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: careerai
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - careerai-net

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: careerai-mailpit
    ports:
      - "1025:1025"   # SMTP (auth-service sends password-reset mail here in dev)
      - "8025:8025"   # Web UI to view captured mail
    networks:
      - careerai-net

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: careerai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - careerai-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: careerai-grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - careerai-net

  zipkin:
    image: openzipkin/zipkin:3
    container_name: careerai-zipkin
    ports:
      - "9411:9411"
    networks:
      - careerai-net

  localstack:
    image: localstack/localstack:3.8
    container_name: careerai-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: 0
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./docker/localstack-init.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
      - localstack-data:/var/lib/localstack
    networks:
      - careerai-net

  # ---- ELK / EFK logging stack ----
  elasticsearch:
    image: elasticsearch:8.16.1
    container_name: careerai-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./docker/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - careerai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  logstash:
    image: logstash:8.16.1
    container_name: careerai-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5044:5044"   # Beats input (Filebeat)
      - "5000:5000"   # TCP json_lines input (logback appender)
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    networks:
      - careerai-net

  kibana:
    image: kibana:8.16.1
    container_name: careerai-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - careerai-net

  filebeat:
    image: elastic/filebeat:8.16.1
    container_name: careerai-filebeat
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    depends_on:
      - logstash
    volumes:
      - ./docker/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - careerai-net

networks:
  careerai-net:
    driver: bridge
    name: careerai-net

volumes:
  pg-auth-data:
  pg-resume-data:
  pg-interview-data:
  pg-jobmatch-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  localstack-data:
  elasticsearch-data:
