input {
  # Filebeat (harvested container stdout).
  beats {
    port => 5044
  }

  # Direct Logstash TCP appender from services (logback LogstashTcpSocketAppender, prod profile).
  tcp {
    port => 5000
    codec => json_lines
  }

  # Application logs published to the Kafka "logs" topic.
  kafka {
    bootstrap_servers => "kafka:29092"
    topics => ["logs"]
    codec => json
    group_id => "logstash-careerai"
    auto_offset_reset => "earliest"
  }
}

filter {
  # Parse the JSON payload when it arrives as a raw string (Filebeat/docker log line).
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  # Normalise the service name from whatever field carried it.
  if [service] {
    mutate { add_field => { "service_name" => "%{service}" } }
  } else if [service_name] {
    # already set
  } else if [container][name] {
    mutate { add_field => { "service_name" => "%{[container][name]}" } }
  } else {
    mutate { add_field => { "service_name" => "unknown" } }
  }

  # Extract a stack trace / exception class when present.
  if [stack_trace] {
    grok {
      match => { "stack_trace" => "(?<exception_class>[a-zA-Z0-9_.]+(?:Exception|Error))" }
      tag_on_failure => []
    }
  }

  mutate {
    lowercase => ["service_name"]
    remove_field => ["agent", "ecs", "host", "input", "log"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "careerai-%{service_name}-%{+YYYY.MM.dd}"
  }
}
