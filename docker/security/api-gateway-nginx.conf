# Optional hardened nginx reverse proxy placed in front of the API gateway.
# Terminates TLS, sets security response headers, and hides server identity.
server {
    listen       443 ssl;
    server_name  api.careerai.example.com;

    ssl_certificate     /etc/nginx/tls/tls.crt;
    ssl_certificate_key /etc/nginx/tls/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ---- Hide implementation details ----
    server_tokens off;
    more_clear_headers Server;   # requires headers-more-nginx-module; harmless if absent

    # ---- Security response headers ----
    add_header X-Frame-Options           "DENY"                                    always;
    add_header X-Content-Type-Options    "nosniff"                                 always;
    add_header X-XSS-Protection          "1; mode=block"                           always;
    add_header Content-Security-Policy    "default-src 'self'"                     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"         always;

    location / {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Redirect plain HTTP to HTTPS.
server {
    listen      80;
    server_name api.careerai.example.com;
    return      301 https://$host$request_uri;
}
