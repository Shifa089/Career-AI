# Production overrides for auth-service (profile: prod).
spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false
  datasource:
    hikari:
      maximum-pool-size: 20

management:
  endpoint:
    env:
      enabled: false
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    com.careerai.auth: INFO
