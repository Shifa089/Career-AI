# Local development overrides for auth-service (profile: dev).
spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # Dev mail: point at a local Mailpit/MailHog SMTP sink (logged, never delivered externally).
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

logging:
  level:
    com.careerai.auth: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
