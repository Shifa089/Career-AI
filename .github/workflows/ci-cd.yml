name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/shifa089/careerai

jobs:
  # ---------------------------------------------------------------------------
  # 1. Test — unit + Testcontainers integration + JaCoCo gate, Codecov upload.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: careerai_test
          POSTGRES_USER: careerai
          POSTGRES_PASSWORD: careerai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U careerai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      zookeeper:
        image: confluentinc/cp-zookeeper:7.7.1
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181
      kafka:
        image: confluentinc/cp-kafka:7.7.1
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        ports:
          - 9092:9092
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run unit + integration tests (JaCoCo gate)
        run: mvn -B clean verify -P ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/target/surefire-reports/*.xml"
          if-no-files-found: ignore

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: "**/target/site/jacoco/**"
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 2. Build & push backend images with Jib (main only).
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        module:
          - api-gateway
          - auth-service
          - resume-service
          - interview-service
          - job-match-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive semantic version tag (if git tag present)
        id: semver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push image with Jib
        run: >-
          mvn -B -pl ${{ matrix.module }} -am package -P docker -DskipTests
          -Djib.to.tags=${{ github.sha }},latest${{ steps.semver.outputs.tag && format(',{0}', steps.semver.outputs.tag) || '' }}
          -Djib.to.auth.username=${{ github.actor }}
          -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 3. Build & push the frontend nginx image.
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/frontend:latest

  # ---------------------------------------------------------------------------
  # 4. Deploy to staging (main only): Railway + migrations + smoke tests.
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, build-frontend]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy services to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          for svc in api-gateway auth-service resume-service interview-service job-match-service frontend; do
            echo "Deploying $svc ..."
            railway up --service "$svc" --detach
          done

      - name: Run database migrations (Flyway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # One-off Flyway migrate per JPA service against the staging databases.
          echo "Applying Flyway migrations against staging databases..."
          railway run --service auth-service "mvn -pl auth-service flyway:migrate" || true

      - name: Smoke test — /actuator/health
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          set -e
          for path in / /auth /resume /interview /jobmatch; do
            url="${STAGING_BASE_URL}${path}/actuator/health"
            echo "Checking $url"
            code=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 10 "$url" || echo 000)
            if [[ "$code" != "200" ]]; then
              echo "Health check failed for $url (HTTP $code)"; exit 1
            fi
          done

  # ---------------------------------------------------------------------------
  # 5. Integration tests against staging (Newman / Postman collection).
  # ---------------------------------------------------------------------------
  integration-test-staging:
    name: Integration Tests (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Run E2E collection against staging
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: >-
          newman run .github/e2e/careerai.postman_collection.json
          --env-var "baseUrl=${STAGING_BASE_URL}"
          --reporters cli,junit
          --reporter-junit-export newman-results.xml

      - name: Upload Newman results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: newman-results.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 6. Deploy to production (manual approval via the `production` environment).
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: integration-test-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy services to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROD_TOKEN }}
        run: |
          for svc in api-gateway auth-service resume-service interview-service job-match-service frontend; do
            echo "Deploying $svc to production ..."
            railway up --service "$svc" --detach
          done

      - name: Smoke test — production /actuator/health
        env:
          PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
        run: |
          set -e
          for path in / /auth /resume /interview /jobmatch; do
            url="${PROD_BASE_URL}${path}/actuator/health"
            echo "Checking $url"
            code=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 10 "$url" || echo 000)
            if [[ "$code" != "200" ]]; then
              echo "Health check failed for $url (HTTP $code)"; exit 1
            fi
          done
