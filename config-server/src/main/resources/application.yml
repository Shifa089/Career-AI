server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        # Native profile serves config from the local classpath/filesystem in dev.
        native:
          search-locations: classpath:/config/{application}
        git:
          uri: ${CONFIG_GIT_URI:https://github.com/careerai/careerai-config}
          default-label: main
          clone-on-start: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
