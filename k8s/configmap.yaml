apiVersion: v1
kind: ConfigMap
metadata:
  name: careerai-config
  namespace: careerai
  labels:
    app.kubernetes.io/part-of: careerai
data:
  # ---- Spring ----
  SPRING_PROFILES_ACTIVE: "prod"
  # Graceful shutdown so in-flight requests drain during a rolling update
  # (distroless has no shell, so this replaces a preStop `sleep`).
  SERVER_SHUTDOWN: "graceful"

  # ---- Datastores (in-cluster services) ----
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USERNAME: "careerai"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # ---- Messaging ----
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  # ---- Service discovery / config ----
  EUREKA_URL: "http://discovery-server:8761/eureka/"
  CONFIG_SERVER_URL: "http://config-server:8888"

  # ---- Observability ----
  ZIPKIN_BASE_URL: "http://zipkin:9411"
  LOGSTASH_HOST: "logstash"
  LOGSTASH_PORT: "5000"

  # ---- AWS / S3 ----
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "careerai-resumes"
  AWS_S3_ENDPOINT: ""

  # ---- App ----
  FRONTEND_URL: "https://careerai.example.com"
  APP_BASE_URL: "https://api.careerai.example.com"
