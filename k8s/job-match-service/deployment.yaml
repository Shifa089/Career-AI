apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-match-service
  namespace: careerai
  labels:
    app: job-match-service
    app.kubernetes.io/part-of: careerai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-match-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: job-match-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8084"
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: job-match-service
          image: ghcr.io/shifa089/careerai/job-match-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084
          envFrom:
            - configMapRef:
                name: careerai-config
            - secretRef:
                name: careerai-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-pull
