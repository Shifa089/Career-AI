spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/interview_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
  jpa:
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false

management:
  endpoint:
    env:
      enabled: false
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    com.careerai.interview: INFO
