server:
  port: 8083

spring:
  application:
    name: interview-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/interview_db
    username: ${DB_USERNAME:careerai}
    password: ${DB_PASSWORD:careerai}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: interview-service
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.UUIDSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Fail a publish in ~5s if the broker is unreachable instead of blocking the default 60s.
        max.block.ms: 5000
  websocket:
    message-size-limit: 65536
  http:
    client:
      # Bounds the Spring AI (Anthropic) RestClient so a slow/unauthenticated model call fails fast
      # instead of hanging question generation indefinitely.
      connect-timeout: 10s
      read-timeout: 60s
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
          max-tokens: 1000

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    # The gateway routes by the address a service registers here. Default to a resolvable
    # localhost so single-machine dev works; the machine's canonical hostname can resolve
    # (via ISP DNS) to a bogus public IP, which makes lb:// routing fail. Override in prod.
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_PREFER_IP:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [traceId=%X{traceId:-},spanId=%X{spanId:-}] %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      anthropic-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      anthropic-api:
        max-attempts: 3
        wait-duration: 2s
