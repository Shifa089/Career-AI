spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

management:
  endpoint:
    env:
      enabled: false
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    com.careerai.gateway: INFO
    org.springframework.cloud.gateway: WARN
