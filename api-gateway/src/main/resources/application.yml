server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      # Explicit routes only (defined programmatically in GatewayConfig). Discovery auto-routing is
      # disabled so registered services are not silently exposed at /{service-id}/**.
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s

# HS256 secret shared with auth-service (which mints the tokens) and every downstream service.
jwt:
  secret: ${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long}

# Custom per-user token bucket (see RateLimitFilter). Not Spring Gateway's RequestRateLimiter.
gateway:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  rate-limit:
    authenticated-rpm: 100
    unauthenticated-rpm: 20

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /v3/api-docs/auth-service
      - name: resume-service
        url: /v3/api-docs/resume-service
      - name: interview-service
        url: /v3/api-docs/interview-service
      - name: job-match-service
        url: /v3/api-docs/job-match-service

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      auth-cb:
        base-config: default
        wait-duration-in-open-state: 10s
      resume-cb:
        base-config: default
        wait-duration-in-open-state: 30s
      interview-cb:
        base-config: default
        wait-duration-in-open-state: 30s
      jobmatch-cb:
        base-config: default
        wait-duration-in-open-state: 30s
  timelimiter:
    configs:
      # The reactive circuit-breaker starter wraps every call in a TimeLimiter that defaults to 1s;
      # override it so slow downstreams (LLM calls) don't trip fallbacks spuriously.
      default:
        timeout-duration: 30s
    instances:
      auth-cb:
        timeout-duration: 5s
      resume-cb:
        timeout-duration: 60s
      interview-cb:
        timeout-duration: 30s
      jobmatch-cb:
        timeout-duration: 30s
