server:
  port: 8084

spring:
  application:
    name: job-match-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/jobmatch_db
    username: ${DB_USERNAME:careerai}
    password: ${DB_PASSWORD:careerai}
  jpa:
    hibernate:
      # 'none', not 'validate': Hibernate schema validation rejects the pgvector `vector(1536)`
      # columns (mapped via a custom UserType), so we rely on Flyway as the single source of truth.
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: job-match-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.UUIDDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.careerai.jobmatch.event.ResumeAnalysedEvent
        spring.json.use.type.headers: false
        spring.json.trusted.packages: "com.careerai.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.UUIDSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  security:
    oauth2:
      resourceserver:
        jwt:
          secret: ${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long}
  ai:
    # Both Anthropic and OpenAI starters are on the classpath: pick chat from Anthropic (Claude) and
    # embeddings from OpenAI (text-embedding-3-small) so ChatClient/EmbeddingModel resolve unambiguously.
    model:
      chat: anthropic
      embedding: openai
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 1536

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# External job source (Adzuna). Leave blank to disable live ingestion; the dev seeder still runs.
adzuna:
  base-url: ${ADZUNA_BASE_URL:https://api.adzuna.com/v1/api}
  country: ${ADZUNA_COUNTRY:gb}
  app-id: ${ADZUNA_APP_ID:}
  app-key: ${ADZUNA_APP_KEY:}

job-match:
  matching:
    cache-ttl-minutes: ${MATCH_CACHE_TTL_MINUTES:30}
    embedding-cache-ttl-minutes: ${EMBEDDING_CACHE_TTL_MINUTES:60}
  ingestion:
    seed-sample-jobs: ${SEED_SAMPLE_JOBS:true}

resilience4j:
  circuitbreaker:
    instances:
      anthropic-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      anthropic-api:
        max-attempts: 3
        wait-duration: 2s
